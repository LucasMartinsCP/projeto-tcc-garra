<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle da Máquina de Garra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Controle da Máquina de Garra</h1>

  <div class="controls">
    <div class="row">
      <button id="btnFrente">Frente</button>
    </div>
    <div class="row">
      <button id="btnEsquerda">Esquerda</button>
      <button id="btnParar">Parar</button>
      <button id="btnDireita">Direita</button>
    </div>
    <div class="row">
      <button id="btnTras">Trás</button>
    </div>
  </div>

  <div class="vertical">
    <button id="btnSubir">Subir</button>
    <button id="btnDescer">Descer</button>
  </div>

  <div class="garra">
    <button id="btnAbrir">Abrir Garra</button>
    <button id="btnFechar">Fechar Garra</button>
  </div>

  <div id="status">Status: parado</div>

  <script src="script.js"></script>
</body>
</html>
